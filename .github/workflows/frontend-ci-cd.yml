name: Frontend CI/CD Workflow

on:
  pull_request:
    branches:
      - main
      - master
    types:
      - closed
    paths:
      - "frontend/**"
      - ".github/workflows/**"
      - ".github/pull_request_template.md"
  workflow_dispatch:
    inputs:
      change_type:
        description: "Tipo de mudanca para versionamento (novo-marco|nova-feature-refactor|bug-fix|outros)"
        required: false
        default: "outros"

jobs:
  tag-creation:
    name: 0. Automatic Creation Process of New Tags
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    outputs:
      created_tag: ${{ steps.created_tag.outputs.created_tag }}
      change_type: ${{ steps.change_type.outputs.change_type }}

    steps:
      - uses: actions/checkout@v4

      - name: Install GitHub CLI
        run: sudo apt-get update && sudo apt-get install -y gh

      - name: Extract type of change from PR body or dispatch input
        id: change_type
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            change_type="${{ github.event.inputs.change_type }}"
          else
            echo "${{ github.event.pull_request.body }}" > body.txt
            change_type=""
            if grep -q "\[x\] novo-marco" body.txt; then
              change_type="novo-marco"
            elif grep -q "\[x\] nova-feature-refactor" body.txt; then
              change_type="nova-feature-refactor"
            elif grep -q "\[x\] bug-fix" body.txt; then
              change_type="bug-fix"
            elif grep -q "\[x\] outros" body.txt; then
              change_type="outros"
            else
              echo "No option selected correctly in change_type"
              exit 1
            fi
          fi

          case "$change_type" in
            novo-marco|nova-feature-refactor|bug-fix|outros) ;;
            *)
              echo "Invalid change_type: $change_type"
              exit 1
              ;;
          esac

          echo "change_type=$change_type" >> "$GITHUB_OUTPUT"

      - name: Get the last release tag
        id: last_tag
        run: |
          gh auth setup-git
          tag=$(gh release list --limit 1 --json tagName --jq '.[0].tagName' || true)
          if [[ -z "$tag" || ! "$tag" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            tag="0.0.0"
          fi
          echo "last_tag=$tag" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_TOKEN: ${{ secrets.GHCR_TOKEN != '' && secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Calculate new tag
        id: created_tag
        run: |
          IFS='.' read -r major minor patch <<< "${{ steps.last_tag.outputs.last_tag }}"

          case "${{ steps.change_type.outputs.change_type }}" in
            bug-fix)
              patch=$((patch + 1))
              ;;
            nova-feature-refactor)
              minor=$((minor + 1))
              patch=0
              ;;
            novo-marco)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            outros)
              ;;
          esac

          created_tag="${major}.${minor}.${patch}"
          echo "New tag: $created_tag"
          echo "created_tag=$created_tag" >> "$GITHUB_OUTPUT"

  frontend-docker:
    name: 2. Frontend CI/CD
    runs-on: ubuntu-latest
    needs: tag-creation
    env:
      CREATED_TAG: ${{ needs.tag-creation.outputs.created_tag }}
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write
      security-events: write
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check package.json
        id: has_package
        run: |
          if [ -f package.json ]; then
            echo "has_package=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_package=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.has_package.outputs.has_package == 'true'
        run: npm ci

      - name: Run Lint
        if: steps.has_package.outputs.has_package == 'true'
        run: npm run lint --if-present

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USER != '' && secrets.GHCR_USER || github.actor }}
          password: ${{ secrets.GHCR_TOKEN != '' && secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_APP_VERSION=$CREATED_TAG \
            -t ghcr.io/${{ github.repository_owner }}/custos-pe-frontend:$CREATED_TAG \
            -f Dockerfile .

      - name: Tag image as latest
        run: |
          docker tag ghcr.io/${{ github.repository_owner }}/custos-pe-frontend:$CREATED_TAG ghcr.io/${{ github.repository_owner }}/custos-pe-frontend:latest

      - name: Install Docker Scout
        run: |
          curl -fsSL https://raw.githubusercontent.com/docker/scout-cli/main/install.sh -o install-scout.sh
          sh install-scout.sh

      - name: Scan image for critical vulnerabilities
        run: |
          docker scout cves --only-severity critical --exit-code ghcr.io/${{ github.repository_owner }}/custos-pe-frontend:$CREATED_TAG
          docker scout quickview ghcr.io/${{ github.repository_owner }}/custos-pe-frontend:$CREATED_TAG

      - name: Push Docker images (version and latest)
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/custos-pe-frontend:$CREATED_TAG
          docker push ghcr.io/${{ github.repository_owner }}/custos-pe-frontend:latest

      - name: Trigger Portainer webhook to update Frontend service
        if: secrets.PORTAINER_WEBHOOK_FRONTEND != ''
        run: curl -X POST ${{ secrets.PORTAINER_WEBHOOK_FRONTEND }}

  release-creation:
    name: 3. Automatic Creation Process of New Releases
    runs-on: ubuntu-latest
    needs: [tag-creation, frontend-docker]
    env:
      CREATED_TAG: ${{ needs.tag-creation.outputs.created_tag }}
      CHANGE_TYPE: ${{ needs.tag-creation.outputs.change_type }}
    steps:
      - uses: actions/checkout@v4

      - name: Release Publication
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.CREATED_TAG }}
          name: Release ${{ env.CREATED_TAG }}
          generate_release_notes: true
          body: |
            Release automatically generated from pull request #${{ github.event.pull_request.number || 'manual-dispatch' }}
            Type of change: ${{ env.CHANGE_TYPE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GHCR_TOKEN != '' && secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}
