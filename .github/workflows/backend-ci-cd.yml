name: Backend CI/CD Workflow

on:
  pull_request:
    branches:
      - main
      - master
    types:
      - closed
    paths:
      - "backend/**"
      - ".github/workflows/**"
      - ".github/pull_request_template.md"
  workflow_dispatch:
    inputs:
      change_type:
        description: "Tipo de mudanca para versionamento (novo-marco|nova-feature-refactor|bug-fix|outros)"
        required: false
        default: "outros"

jobs:
  tag-creation:
    name: 0. Automatic Creation Process of New Tags
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    outputs:
      created_tag: ${{ steps.created_tag.outputs.created_tag }}
      change_type: ${{ steps.change_type.outputs.change_type }}

    steps:
      - uses: actions/checkout@v4

      - name: Install GitHub CLI
        run: sudo apt-get update && sudo apt-get install -y gh

      - name: Extract type of change from PR body or dispatch input
        id: change_type
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            change_type="${{ github.event.inputs.change_type }}"
          else
            echo "${{ github.event.pull_request.body }}" > body.txt
            change_type=""
            if grep -qi "\[[xX]\] novo-marco" body.txt; then
              change_type="novo-marco"
            elif grep -qi "\[[xX]\] nova-feature-refactor" body.txt; then
              change_type="nova-feature-refactor"
            elif grep -qi "\[[xX]\] bug-fix" body.txt; then
              change_type="bug-fix"
            elif grep -qi "\[[xX]\] outros" body.txt; then
              change_type="outros"
            else
              echo "No checkbox found in PR body. Falling back to 'outros'."
              change_type="outros"
            fi
          fi

          case "$change_type" in
            novo-marco|nova-feature-refactor|bug-fix|outros) ;;
            *)
              echo "Invalid change_type: $change_type"
              exit 1
              ;;
          esac

          echo "change_type=$change_type" >> "$GITHUB_OUTPUT"

      - name: Get the last release tag
        id: last_tag
        run: |
          gh auth setup-git
          tag=$(gh release list --limit 1 --json tagName --jq '.[0].tagName' || true)
          if [[ -z "$tag" || ! "$tag" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            tag="0.0.0"
          fi
          echo "last_tag=$tag" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_TOKEN: ${{ secrets.GHCR_TOKEN != '' && secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Calculate new tag
        id: created_tag
        run: |
          IFS='.' read -r major minor patch <<< "${{ steps.last_tag.outputs.last_tag }}"

          case "${{ steps.change_type.outputs.change_type }}" in
            bug-fix)
              patch=$((patch + 1))
              ;;
            nova-feature-refactor)
              minor=$((minor + 1))
              patch=0
              ;;
            novo-marco)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            outros)
              ;;
          esac

          created_tag="${major}.${minor}.${patch}"
          echo "New tag: $created_tag"
          echo "created_tag=$created_tag" >> "$GITHUB_OUTPUT"

  backend-docker:
    name: 1. Backend CI/CD
    runs-on: ubuntu-latest
    needs: tag-creation
    env:
      CREATED_TAG: ${{ needs.tag-creation.outputs.created_tag }}
      REGISTRY_OWNER: ${{ github.repository_owner }}
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
      packages: write
      security-events: write
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore ./TransparenciaPE.sln

      - name: Run Tests and Code Coverage
        id: test-coverage
        run: |
          sudo apt-get update && sudo apt-get install -y libxml2-utils

          dotnet test ./TransparenciaPE.sln --collect:"XPlat Code Coverage" --settings ./coverlet.runsettings --results-directory ./coverage/

          COVERAGE_FILE=$(find ./coverage -name coverage.opencover.xml -print -quit)

          if [ -z "$COVERAGE_FILE" ]; then
            echo "coverage.opencover.xml not found"
            exit 1
          fi

          RAW_COVERAGE=$(xmllint --xpath 'string(/CoverageSession/Summary/@sequenceCoverage)' "$COVERAGE_FILE")
          COVERAGE_PERCENTAGE=$(echo "$RAW_COVERAGE" | cut -d. -f1)

          echo "report_path=$COVERAGE_FILE" >> "$GITHUB_OUTPUT"
          echo "coverage_percentage=${COVERAGE_PERCENTAGE:-0}" >> "$GITHUB_OUTPUT"

      - name: Upload coverage badge to README (if file exists)
        run: |
          if [ -f ../README.md ]; then
            BADGE="![Coverage](https://img.shields.io/badge/Coverage-${{ steps.test-coverage.outputs.coverage_percentage }}%25-brightgreen)"
            if grep -q "<!-- COVERAGE_BADGE -->" ../README.md; then
              sed -i "0,/<!-- COVERAGE_BADGE -->/s|.*<!-- COVERAGE_BADGE -->|$BADGE <!-- COVERAGE_BADGE -->|" ../README.md
            else
              printf "%s\n\n<!-- COVERAGE_BADGE -->\n" "$BADGE" | cat - ../README.md > ../README.tmp && mv ../README.tmp ../README.md
            fi

            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add ../README.md
            git commit -m "ci: update backend coverage badge to ${{ steps.test-coverage.outputs.coverage_percentage }}%" || true
            git push || true
          else
            echo "README.md not found, skipping badge update"
          fi

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USER != '' && secrets.GHCR_USER || github.actor }}
          password: ${{ secrets.GHCR_TOKEN != '' && secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Convert registry owner to lowercase
        id: lowercase_owner
        run: |
          REGISTRY_OWNER_LOWER=$(echo "$REGISTRY_OWNER" | tr '[:upper:]' '[:lower:]')
          echo "owner=$REGISTRY_OWNER_LOWER" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build \
            -t ghcr.io/${{ steps.lowercase_owner.outputs.owner }}/custos-pe-backend:$CREATED_TAG \
            -f Dockerfile .

      - name: Tag image as latest
        run: |
          docker tag ghcr.io/${{ steps.lowercase_owner.outputs.owner }}/custos-pe-backend:$CREATED_TAG ghcr.io/${{ steps.lowercase_owner.outputs.owner }}/custos-pe-backend:latest

      - name: Push Docker images (version and latest)
        run: |
          docker push ghcr.io/${{ steps.lowercase_owner.outputs.owner }}/custos-pe-backend:$CREATED_TAG
          docker push ghcr.io/${{ steps.lowercase_owner.outputs.owner }}/custos-pe-backend:latest

      - name: Trigger Portainer webhook to update Backend service
        if: env.PORTAINER_WEBHOOK_BACKEND != ''
        env:
          PORTAINER_WEBHOOK_BACKEND: ${{ secrets.PORTAINER_WEBHOOK_BACKEND }}
        run: curl -X POST "$PORTAINER_WEBHOOK_BACKEND"

  release-creation:
    name: 3. Automatic Creation Process of New Releases
    runs-on: ubuntu-latest
    needs: [tag-creation, backend-docker]
    permissions:
      contents: write
    env:
      CREATED_TAG: ${{ needs.tag-creation.outputs.created_tag }}
      CHANGE_TYPE: ${{ needs.tag-creation.outputs.change_type }}
    steps:
      - uses: actions/checkout@v4

      - name: Release Publication
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.CREATED_TAG }}
          name: Release ${{ env.CREATED_TAG }}
          generate_release_notes: true
          body: |
            Release automatically generated from pull request #${{ github.event.pull_request.number || 'manual-dispatch' }}
            Type of change: ${{ env.CHANGE_TYPE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
